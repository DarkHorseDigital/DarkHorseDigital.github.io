<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор жира и специй</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Калькулятор жира и специй</h1>

        <div class="input-group">
            <label for="beefFat">Жирность жира (%):</label>
            <input type="number" id="beefFat" placeholder="Например, 87.4" step="0.1">
        </div>

        <div class="input-group">
            <label for="beefLean">Жирность мякоти (%):</label>
            <input type="number" id="beefLean" placeholder="Например, 8.1" step="0.1">
        </div>

        <div class="input-group">
            <label for="leanWeight">Масса мякоти (г):</label>
            <input type="number" id="leanWeight" placeholder="Например, 2000">
        </div>

        <button id="calculateBtn">Рассчитать</button>

        <div id="results"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
